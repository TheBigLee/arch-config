---
# Role: hyprland
# Clones Arch-Hyprland, writes a preset file, and registers the interactive
# installer to be launched at the end of install.sh.
#
# The Arch-Hyprland install.sh uses whiptail dialogs and cannot run fully
# unattended. This role prepares everything so the interactive portion is
# as brief as possible (just confirm the pre-filled checkboxes).

- name: Ensure git is present
  become: true
  community.general.pacman:
    name: git
    state: present

- name: Clone Arch-Hyprland repository
  ansible.builtin.git:
    repo: "{{ arch_hyprland_repo }}"
    dest: "{{ arch_hyprland_dir }}"
    depth: 1
    update: true

- name: Make install.sh executable
  ansible.builtin.file:
    path: "{{ arch_hyprland_dir }}/install.sh"
    mode: '0755'

- name: Write preset configuration file
  vars:
    effective_options: "{{ hyprland_options | combine(hyprland_option_overrides) }}"
  ansible.builtin.copy:
    dest: "{{ arch_hyprland_dir }}/preset.conf"
    mode: '0644'
    content: |
      # Arch-Hyprland preset — generated by Ansible for {{ inventory_hostname }}
      # Sourced via: ./install.sh --preset preset.conf
      #
      # NOTE: install.sh still shows interactive whiptail dialogs even with --preset.
      # Use this file as a reference for which boxes to check in the UI.
      {% for key, value in effective_options.items() %}
      {{ key }}="{{ value }}"
      {% endfor %}

- name: Print interactive installer instructions
  ansible.builtin.debug:
    msg: |
      ============================================================
       Arch-Hyprland cloned to: {{ arch_hyprland_dir }}
       A preset has been written to: {{ arch_hyprland_dir }}/preset.conf

       The installer requires interactive input (whiptail UI).
       install.sh will launch it automatically as the final step.

       When the checklist appears, select options matching preset.conf.
       Recommended selections are already set to ON in that file.
      ============================================================
