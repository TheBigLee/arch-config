---
# Shared package lists and defaults — applies to all machines.
# Machine-specific additions go in host_vars/<hostname>.yml

pacman_packages:
  # Base system
  - base-devel
  - linux-headers
  - git
  - curl
  - wget
  - man-db
  - man-pages

  # Shell & terminal
  - zsh
  - tmux
  - starship

  # Editors
  - neovim

  # CLI tools
  - fzf
  - ripgrep
  - fd
  - bat
  - eza
  - jq
  - htop
  - btop
  - rsync
  - unzip
  - zip

  # Networking
  - networkmanager
  - openssh
  - tailscale

  # Fonts
  - ttf-jetbrains-mono-nerd
  - noto-fonts
  - noto-fonts-emoji

  # Development
  - python
  - python-pip
  - go
  - docker

  # Security
  - gnupg
  - pass

  # Misc
  - ansible
  - chezmoi

# Per-machine additions (override in host_vars/<hostname>.yml)
extra_pacman_packages: []

aur_packages: []

# Per-machine AUR additions (override in host_vars/<hostname>.yml)
extra_aur_packages: []

systemd_services_enable:
  - NetworkManager
  - sshd
  - tailscaled
  - docker

# Per-machine service additions (override in host_vars/<hostname>.yml)
extra_services_enable: []

systemd_services_disable: []

locale: en_US.UTF-8
keyboard_layout: ch

# Default Hyprland installer options — override keys in host_vars/<hostname>.yml
# via hyprland_option_overrides: { key: "ON/OFF" }
hyprland_options:
  sddm: "ON"
  sddm_theme: "ON"
  gtk_themes: "ON"
  bluetooth: "OFF"
  thunar: "ON"
  quickshell: "OFF"
  xdph: "ON"
  zsh: "OFF"
  pokemon: "OFF"
  rog: "OFF"
  dots: "ON"
  input_group: "ON"
  nvidia: "OFF"
  nouveau: "OFF"

chezmoi_repo: https://github.com/TheBigLee/dot-chezmoi

# No default — must be set in host_vars/<hostname>.yml
# hostname: ~
# timezone: ~
hyprland_option_overrides: {}
