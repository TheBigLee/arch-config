---
# Shared package lists and defaults — applies to all machines.
# Machine-specific additions go in host_vars/<hostname>.yml

pacman_packages:
  # Base system
  - base-devel
  - linux-headers
  - git
  - curl
  - wget
  - man-db
  - man-pages

  # Shell & terminal
  - zsh
  - tmux
  - starship

  # Editors
  - neovim

  # Language servers
  - lua-language-server
  - gopls
  - bash-language-server
  - marksman

  # CLI tools
  - fzf
  - ripgrep
  - fd
  - bat
  - eza
  - jq
  - htop
  - btop
  - rsync
  - unzip
  - zip
  - bc
  - direnv
  - go-yq
  - lazygit
  - zoxide
  - zellij

  # Networking
  - networkmanager
  - openssh
  - tailscale

  # Fonts
  - ttf-jetbrains-mono-nerd
  - noto-fonts
  - noto-fonts-emoji

  # Development
  - python
  - python-pip
  - go
  - delve
  - docker
  - docker-buildx
  - helm
  - kubectl
  - kubectx
  - krew
  - opentofu
  - pre-commit
  - python-cookiecutter

  # Security
  - gnupg
  - pass
  - sops
  - gitleaks

  # Misc
  - ansible
  - chezmoi
  - github-cli
  - kitty
  - obsidian
  - pwgen
  - syncthing
  - thunderbird

aur_packages:
  - 1password
  - 1password-cli
  - claude-code
  - devpod-bin
  - jsonnet-language-server
  - vscode-json-languageserver
  - yaml-language-server
  - ferdium-bin
  - jai
  - kubecolor
  - tofi
  - zen-browser-bin
  - zoom

systemd_services_enable:
  - NetworkManager
  - sshd
  - tailscaled
  - docker

systemd_services_disable: []

locale: en_US.UTF-8
keyboard_layout: ch

# Default Hyprland installer options — override keys in host_vars/<hostname>.yml
# via hyprland_option_overrides: { key: "ON/OFF" }
hyprland_options:
  sddm: "ON"
  sddm_theme: "ON"
  gtk_themes: "ON"
  bluetooth: "OFF"
  thunar: "ON"
  quickshell: "OFF"
  xdph: "ON"
  zsh: "OFF"
  pokemon: "OFF"
  rog: "OFF"
  dots: "ON"
  input_group: "ON"
  nvidia: "OFF"
  nouveau: "OFF"

chezmoi_repo: https://github.com/TheBigLee/dot-chezmoi

# No default — must be set in host_vars/<hostname>.yml
# hostname: ~
# timezone: ~
hyprland_option_overrides: {}
