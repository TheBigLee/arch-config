---
# Main playbook for reproducible Arch Linux setup
# Usage: ansible-playbook setup.yml --ask-become-pass
- name: Arch Linux system setup
  hosts: localhost
  connection: local
  become: false

  vars_files:
    - vars/packages.yml

  pre_tasks:
    - name: Update pacman database
      become: true
      community.general.pacman:
        update_cache: true

  roles:
    - base
    - aur
    - services
    - hardware
