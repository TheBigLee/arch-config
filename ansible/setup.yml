---
# Main playbook for reproducible Arch Linux setup
# Usage: ansible-playbook -i inventory setup.yml --limit $(hostname) --ask-become-pass
- name: Arch Linux system setup
  hosts: all
  become: false

  vars_files:
    - vars/packages.yml

  pre_tasks:
    - name: Update pacman database
      become: true
      community.general.pacman:
        update_cache: true

  roles:
    - base
    - aur
    - services
    - hardware
    - secureboot
    - hyprland
